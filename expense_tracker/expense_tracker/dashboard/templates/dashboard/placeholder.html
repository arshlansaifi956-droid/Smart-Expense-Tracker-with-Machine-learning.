{% extends 'dashboard/base.html' %}

{% block content %}
<div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; text-align: center;">
    <span class="material-icons-round" style="font-size: 64px; color: var(--primary-color); margin-bottom: 24px;">{{ icon }}</span>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 12px;">{{ title }} Section</h2>
    <p style="color: var(--text-muted); max-width: 400px;">This part of the Smart Expense Tracker is currently being developed to provide full integration with your financial data.</p>
</div>
{% endblock %}
